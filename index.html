  <div class="settings-panel" id="settingsPanel">
    <div style="max-width:420px;margin:0 auto;">
      <div class="settings-header">
        <div class="settings-title">My Wardrobe</div>
        <button class="close-btn" onclick="closeSettings()">✕</button>
      </div>
      <div class="section-title">겉옷</div>
      <div class="warmth-hint">따뜻함 1(얇음) ~ 10(두꺼움) / 방수여부 체크</div>
      <div id="outerList"></div>
      <div class="add-row">
        <input class="add-input" id="newOuterName" placeholder="겉옷 이름" />
        <input class="warmth-input" id="newOuterWarmth" type="number" placeholder="1~10" min="1" max="10" />
        <button class="add-btn" onclick="addOuter()">+</button>
      </div>
      <div class="section-title">하의</div>
      <div class="warmth-hint">따뜻함 1(얇음) ~ 10(두꺼움)</div>
      <div id="bottomList"></div>
      <div class="add-row">
        <input class="add-input" id="newBottomName" placeholder="하의 이름" />
        <input class="warmth-input" id="newBottomWarmth" type="number" placeholder="1~10" min="1" max="10" />
        <button class="add-btn" onclick="addBottom()">+</button>
      </div>
      <button class="save-btn" onclick="saveAndClose()">저장하고 닫기</button>
    </div>
  </div>

  <script>
    const DEFAULT_OUTERWEAR = [
      { name: "얇은 패딩", warmth: 9, waterproof: false },
      { name: "두꺼운 울 가디건", warmth: 8, waterproof: false },
      { name: "모직 재킷", warmth: 7, waterproof: false },
      { name: "바람막이", warmth: 6.5, waterproof: true },
      { name: "보통 재킷", warmth: 6, waterproof: false },
      { name: "얇은 정장 재킷", warmth: 5, waterproof: false },
      { name: "얇은 가디건", warmth: 5, waterproof: false },
      { name: "반팔 재킷", warmth: 3, waterproof: false },
      { name: "얇은 반팔 재킷", warmth: 2, waterproof: false },
    ];
    const DEFAULT_BOTTOMS = [
      { name: "기모바지", warmth: 9 },
      { name: "두꺼운 청바지", warmth: 8 },
      { name: "중간두께 롱스커트", warmth: 6.5 },
      { name: "면바지", warmth: 6 },
      { name: "얇은 청바지", warmth: 5.5 },
      { name: "얇은 슬랙스", warmth: 5 },
      { name: "얇은 롱스커트", warmth: 4 },
      { name: "숏스커트", warmth: 2 },
      { name: "반바지", warmth: 1 },
    ];
    const EMOJIS = { sunny: "☀️", partly: "⛅", cloudy: "☁️", rain: "🌧️" };

    let hourlyRainData = [];
    let maxRainProb = 0;

    function loadWardrobe() {
      try {
        const o = localStorage.getItem("outerwear");
        const b = localStorage.getItem("bottoms");
        return { outerwear: o ? JSON.parse(o) : DEFAULT_OUTERWEAR, bottoms: b ? JSON.parse(b) : DEFAULT_BOTTOMS };
      } catch(e) { return { outerwear: DEFAULT_OUTERWEAR, bottoms: DEFAULT_BOTTOMS }; }
    }
    function saveWardrobe(o, b) { localStorage.setItem("outerwear", JSON.stringify(o)); localStorage.setItem("bottoms", JSON.stringify(b)); }

    let wardrobe = loadWardrobe();
    let editOuterwear = [], editBottoms = [];

    function getClosest(items, score, count) {
      return [...items].sort((a, b) => Math.abs(a.warmth - score) - Math.abs(b.warmth - score)).slice(0, count);
    }

    function getRecommendations(minTemp, maxTemp, windSpeed, rainProb) {
      const wind = parseFloat(windSpeed) || 0;
      const rain = parseFloat(rainProb) || 0;
      const feelFactor = wind > 4 ? -2 : wind > 2 ? -1 : 0;
      const adjustedMin = minTemp + feelFactor;
      const adjustedMax = maxTemp + feelFactor;
      const avg = (adjustedMin + adjustedMax) / 2;
      const range = maxTemp - minTemp;

      let outerScore;
      if (adjustedMin <= 5) outerScore = 9;
      else if (adjustedMin <= 8) outerScore = 8.5;
      else if (adjustedMin <= 11) outerScore = 7.5;
      else if (adjustedMin <= 14) outerScore = 6.5;
      else if (adjustedMin <= 17) outerScore = 5;
      else if (adjustedMin <= 20) outerScore = 3;
      else outerScore = 2;

      let bottomScore;
      if (avg <= 8) bottomScore = 9;
      else if (avg <= 12) bottomScore = 8;
      else if (avg <= 16) bottomScore = 6.5;
      else if (avg <= 19) bottomScore = 5.5;
      else if (avg <= 22) bottomScore = 4.5;
      else if (avg <= 25) bottomScore = 3;
      else bottomScore = 1.5;

      // 비 올 때 방수 겉옷 우선
      let outerPool = [...wardrobe.outerwear];
      if (rain >= 50) {
        const waterproofItems = outerPool.filter(i => i.waterproof);
        if (waterproofItems.length > 0) {
          outerPool = [...waterproofItems, ...outerPool.filter(i => !i.waterproof)];
        }
      }

      const outers = getClosest(outerPool, outerScore, 3);
      const bottoms = getClosest(wardrobe.bottoms, bottomScore, 3);
      const combos = [];

      const windNote = wind > 3 ? "바람 있어요 🌬️" : null;
      const rangeNote = range >= 13 ? "일교차 주의!" : null;
      const rainNote = rain >= 50 ? "우산 필수 ☂️" : rain >= 30 ? "우산 챙기세요" : null;
      const mainNote = rainNote || windNote || rangeNote;

      combos.push({ label: range >= 13 ? "아침 외출 추천" : "기본 추천", outer: outers[0], bottom: bottoms[0], note: mainNote });
      if (outers[1] && range >= 10) combos.push({ label: "낮 기온 고려", outer: outers[1], bottom: bottoms[0], note: "낮엔 벗어도 OK" });
      if (bottoms[1]) combos.push({ label: "활동적인 날", outer: outers[0], bottom: bottoms[1], note: null });

      return combos;
    }

    function updateTitle() { document.getElementById("title").textContent = "Outfit " + EMOJIS[document.getElementById("condition").value]; }

    function updateRange() {
      const min = parseFloat(document.getElementById("minTemp").value);
      const max = parseFloat(document.getElementById("maxTemp").value);
      const bar = document.getElementById("rangeBar");
      if (!isNaN(min) && !isNaN(max) && max > min) {
        const range = Math.round(max - min);
        bar.style.display = "block";
        bar.style.color = range >= 13 ? "#e07b54" : "#c8a97e";
        bar.textContent = "일교차 " + range + "도" + (range >= 13 ? " ⚠️ 많이 벌어졌어요" : "");
      } else { bar.style.display = "none"; }
    }

    function showHourlyRain(hourlyData) {
      if (!hourlyData || hourlyData.length === 0) return;
      const now = new Date().getHours();
      const section = document.getElementById("hourlySection");
      const grid = document.getElementById("hourlyGrid");

      // Show next 8 hours
      const slots = [];
      for (let i = 0; i < 8; i++) {
        const h = (now + i) % 24;
        const prob = hourlyData[now + i] || 0;
        slots.push({ hour: h, prob });
      }

      grid.innerHTML = slots.map(s => `
        <div class="hour-cell">
          <div class="hour-time">${s.hour}시</div>
          <div class="hour-prob ${s.prob >= 30 ? 'wet' : 'dry'}">${s.prob}%</div>
        </div>
      `).join("");

      section.style.display = "block";

      // Rain summary bar
      const rainBar = document.getElementById("rainBar");
      const highRainSlots = slots.filter(s => s.prob >= 50);
      maxRainProb = Math.max(...slots.map(s => s.prob));

      if (highRainSlots.length > 0) {
        const startH = highRainSlots[0].hour;
        const endH = highRainSlots[highRainSlots.length - 1].hour;
        rainBar.className = "rain-bar high";
        rainBar.style.display = "block";
        rainBar.textContent = `🌧️ ${startH}시~${endH}시 강수확률 높아요 — 우산 챙기세요`;
      } else if (maxRainProb >= 30) {
        rainBar.className = "rain-bar mid";
        rainBar.style.display = "block";
        rainBar.textContent = `🌂 오늘 강수확률 최대 ${maxRainProb}% — 우산 가져가면 안심`;
      } else {
        rainBar.style.display = "none";
      }
    }

    function recommend() {
      const min = parseFloat(document.getElementById("minTemp").value);
      const max = parseFloat(document.getElementById("maxTemp").value);
      const wind = document.getElementById("wind").value;
      const errorEl = document.getElementById("errorMsg");
      const resultsEl = document.getElementById("results");

      if (isNaN(min) || isNaN(max)) { errorEl.textContent = "⚠️ 최저/최고 기온을 입력해주세요!"; errorEl.style.display = "block"; resultsEl.style.display = "none"; return; }
      if (min >= max) { errorEl.textContent = "⚠️ 최고기온이 최저기온보다 높아야 해요!"; errorEl.style.display = "block"; resultsEl.style.display = "none"; return; }
      errorEl.style.display = "none";

      const combos = getRecommendations(min, max, wind, maxRainProb);
      let html = `<div class="results-title">추천 코디 ${combos.length}가지</div>`;

      // Umbrella card if rain expected
      if (maxRainProb >= 30) {
        const highSlots = hourlyRainData.slice(new Date().getHours(), new Date().getHours() + 8)
          .map((p, i) => ({ hour: (new Date().getHours() + i) % 24, prob: p }))
          .filter(s => s.prob >= 50);
        html += `<div class="umbrella-card">
          <div class="umbrella-title">☂️ 우산 챙기세요</div>
          <div class="rain-hours">
            ${highSlots.length > 0
              ? `${highSlots[0].hour}시~${highSlots[highSlots.length-1].hour}시 강수확률 높음`
              : `오늘 강수확률 최대 ${maxRainProb}%`}
            ${maxRainProb >= 50 && wardrobe.outerwear.some(i => i.waterproof) ? '<br>방수 겉옷 우선 추천했어요' : ''}
          </div>
        </div>`;
      }

      combos.forEach(combo => {
        html += `<div class="card"><div class="card-header"><span class="chip">${combo.label}</span>${combo.note ? `<span class="card-note">${combo.note}</span>` : ""}</div><div class="items-row"><div class="item-box"><div class="item-label">겉옷</div><div class="item-name">${combo.outer.name}</div></div><div class="item-box"><div class="item-label">하의</div><div class="item-name">${combo.bottom.name}</div></div></div></div>`;
      });
      html += `<div class="tip">💡 일교차가 클 땐 겉옷을 쉽게 벗을 수 있는 조합이 좋아요</div>`;
      resultsEl.innerHTML = html;
      resultsEl.style.display = "block";
    }

    async function fetchWeatherByCoords(lat, lon) {
      const statusEl = document.getElementById("fetchStatus");
      try {
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,windspeed_10m_max,weathercode&hourly=precipitation_probability&timezone=Asia%2FSeoul&forecast_days=1`
        );
        if (!res.ok) throw new Error();
        const data = await res.json();
        const max = Math.round(data.daily.temperature_2m_max[0]);
        const min = Math.round(data.daily.temperature_2m_min[0]);
        const windMs = Math.round(data.daily.windspeed_10m_max[0] / 3.6);
        const code = data.daily.weathercode[0];

        // Hourly precipitation (24 values for today)
        hourlyRainData = data.hourly.precipitation_probability.slice(0, 24);
        showHourlyRain(hourlyRainData);

        let cond = "sunny";
        if (code >= 61) cond = "rain";
        else if (code >= 45) cond = "cloudy";
        else if (code >= 2) cond = "partly";

        document.getElementById("minTemp").value = min;
        document.getElementById("maxTemp").value = max;
        document.getElementById("wind").value = windMs;
        document.getElementById("condition").value = cond;
        updateRange(); updateTitle();

        statusEl.className = "fetch-status success";
        statusEl.textContent = "✓ 현재 위치 날씨 불러왔어요";
      } catch(e) {
        statusEl.className = "fetch-status error";
        statusEl.textContent = "날씨 불러오기 실패 — 직접 입력해주세요";
      }
    }

    function fetchWeather() {
      const statusEl = document.getElementById("fetchStatus");
      statusEl.className = "fetch-status";
      statusEl.textContent = "위치 확인 중...";
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude),
          () => fetchWeatherByCoords(37.5172, 126.8665)
        );
      } else { fetchWeatherByCoords(37.5172, 126.8665); }
    }

    function renderList(items, containerId, deleteFn) {
      document.getElementById(containerId).innerHTML = items.map((item, i) =>
        `<div class="item-row"><span>${item.name}${item.waterproof ? ' 💧' : ''}</span><div style="display:flex;align-items:center;"><span class="item-row-warmth">따뜻함 ${item.warmth}</span><button class="delete-btn" onclick="${deleteFn}(${i})">✕</button></div></div>`
      ).join("");
    }

    function openSettings() {
      editOuterwear = JSON.parse(JSON.stringify(wardrobe.outerwear));
      editBottoms = JSON.parse(JSON.stringify(wardrobe.bottoms));
      renderList(editOuterwear, "outerList", "deleteOuter");
      renderList(editBottoms, "bottomList", "deleteBottom");
      document.getElementById("settingsPanel").classList.add("open");
    }
    function closeSettings() { document.getElementById("settingsPanel").classList.remove("open"); }
    function deleteOuter(i) { editOuterwear.splice(i, 1); renderList(editOuterwear, "outerList", "deleteOuter"); }
    function deleteBottom(i) { editBottoms.splice(i, 1); renderList(editBottoms, "bottomList", "deleteBottom"); }
    function addOuter() {
      const name = document.getElementById("newOuterName").value.trim();
      const warmth = parseFloat(document.getElementById("newOuterWarmth").value);
      if (!name || isNaN(warmth)) return;
      editOuterwear.push({ name, warmth, waterproof: false });
      editOuterwear.sort((a, b) => b.warmth - a.warmth);
      document.getElementById("newOuterName").value = "";
      document.getElementById("newOuterWarmth").value = "";
      renderList(editOuterwear, "outerList", "deleteOuter");
    }
    function addBottom() {
      const name = document.getElementById("newBottomName").value.trim();
      const warmth = parseFloat(document.getElementById("newBottomWarmth").value);
      if (!name || isNaN(warmth)) return;
      editBottoms.push({ name, warmth });
      editBottoms.sort((a, b) => b.warmth - a.warmth);
      document.getElementById("newBottomName").value = "";
      document.getElementById("newBottomWarmth").value = "";
      renderList(editBottoms, "bottomList", "deleteBottom");
    }
    function saveAndClose() {
      wardrobe.outerwear = editOuterwear;
      wardrobe.bottoms = editBottoms;
      saveWardrobe(wardrobe.outerwear, wardrobe.bottoms);
      closeSettings();
    }

    fetchWeather();
  </script>

</body>
</html>
