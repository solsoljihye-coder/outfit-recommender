<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Outfit" />
  <title>Outfit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0f0f0f; color: #f0ece4; font-family: Georgia, serif; display: flex; justify-content: center; padding: 44px 16px 60px; }
    .container { width: 100%; max-width: 420px; }
    .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #7a7570; font-family: sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
    .settings-btn { background: transparent; border: none; color: #7a7570; font-size: 18px; cursor: pointer; padding: 0; }
    h1 { font-size: 36px; font-weight: 400; letter-spacing: 0.08em; text-align: center; margin-bottom: 6px; text-transform: uppercase; }
    .desc { font-size: 13px; color: #7a7570; font-family: sans-serif; text-align: center; margin-bottom: 24px; }
    .fetch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .fetch-status { font-size: 12px; font-family: sans-serif; color: #7a7570; }
    .fetch-status.success { color: #c8a97e; }
    .fetch-status.error { color: #e07b54; }
    .refresh-btn { background: transparent; color: #c8a97e; border: 1px solid rgba(200,169,126,0.3); border-radius: 6px; font-size: 12px; font-family: sans-serif; padding: 5px 12px; cursor: pointer; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field-label { font-size: 11px; color: #7a7570; font-family: sans-serif; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
    input, select { background: rgba(255,255,255,0.06); border: 1px solid rgba(200,169,126,0.25); border-radius: 8px; color: #f0ece4; font-size: 16px; padding: 10px 12px; width: 100%; outline: none; font-family: Georgia, serif; -webkit-appearance: none; }
    input:focus, select:focus { border-color: #c8a97e; }
    select option { background: #1a1a1a; color: #f0ece4; }
    .range-bar { font-size: 12px; font-family: sans-serif; padding: 7px 12px; background: rgba(200,169,126,0.05); border-radius: 6px; margin-bottom: 10px; }
    .rain-bar { font-size: 12px; font-family: sans-serif; padding: 7px 12px; border-radius: 6px; margin-bottom: 10px; }
    .rain-bar.high { background: rgba(100,149,237,0.1); color: #6495ed; border: 1px solid rgba(100,149,237,0.2); }
    .rain-bar.mid { background: rgba(200,169,126,0.05); color: #c8a97e; }
    .section-label { font-size: 11px; color: #7a7570; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; margin-top: 16px; }
    .hourly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
    .hour-cell { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 8px 4px; text-align: center; }
    .hour-time { font-size: 10px; color: #7a7570; font-family: sans-serif; margin-bottom: 3px; }
    .hour-prob { font-size: 13px; font-family: sans-serif; }
    .hour-prob.wet { color: #6495ed; }
    .hour-prob.dry { color: #7a7570; }
    .recommend-btn { width: 100%; background: #c8a97e; color: #0f0f0f; border: none; border-radius: 10px; font-size: 15px; font-family: Georgia, serif; font-weight: bold; padding: 14px; cursor: pointer; margin-top: 8px; letter-spacing: 0.05em; }
    .recommend-btn:active { background: #b8996e; }
    .error-msg { color: #e07b54; font-size: 13px; font-family: sans-serif; margin-bottom: 8px; }
    .results { margin-top: 28px; }
    .results-title { font-size: 11px; color: #7a7570; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(200,169,126,0.18); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .chip { display: inline-block; background: rgba(200,169,126,0.12); border: 1px solid rgba(200,169,126,0.3); color: #c8a97e; font-size: 11px; font-family: sans-serif; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
    .card-note { font-size: 11px; color: #7a7570; font-family: sans-serif; }
    .items-row { display: flex; gap: 10px; }
    .item-box { flex: 1; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; }
    .item-label { font-size: 10px; color: #7a7570; text-transform: uppercase; letter-spacing: 0.1em; font-family: sans-serif; margin-bottom: 5px; }
    .item-name { font-size: 16px; }
    .umbrella-card { background: rgba(100,149,237,0.08); border: 1px solid rgba(100,149,237,0.25); border-radius: 12px; padding: 14px 18px; margin-bottom: 12px; }
    .umbrella-title { font-size: 13px; font-family: sans-serif; color: #6495ed; margin-bottom: 8px; font-weight: bold; }
    .rain-hours { font-size: 12px; font-family: sans-serif; color: #a0b4d0; line-height: 1.8; }
    .tip { padding: 12px 14px; background: rgba(200,169,126,0.05); border-radius: 8px; font-size: 12px; color: #7a7570; font-family: sans-serif; line-height: 1.6; }
    .settings-wrap { display: none; width: 100%; max-width: 420px; }
    .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .settings-title { font-size: 24px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; }
    .close-btn { background: transparent; border: none; color: #c8a97e; font-size: 22px; cursor: pointer; }
    .section-title { font-size: 11px; color: #7a7570; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .warmth-hint { font-size: 11px; color: #7a7570; font-family: sans-serif; margin-bottom: 10px; line-height: 1.5; }
    .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(200,169,126,0.1); border-radius: 8px; margin-bottom: 8px; }
    .item-row-warmth { font-size: 11px; color: #7a7570; font-family: sans-serif; margin-right: 12px; }
    .delete-btn { background: transparent; border: none; color: #7a7570; font-size: 18px; cursor: pointer; padding: 0 4px; }
    .add-row { display: flex; gap: 8px; margin-top: 10px; margin-bottom: 28px; }
    .add-input { flex: 2; background: rgba(255,255,255,0.06); border: 1px solid rgba(200,169,126,0.25); border-radius: 8px; color: #f0ece4; font-size: 15px; padding: 10px 12px; outline: none; font-family: Georgia, serif; }
    .warmth-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(200,169,126,0.25); border-radius: 8px; color: #f0ece4; font-size: 15px; padding: 10px 12px; outline: none; font-family: Georgia, serif; }
    .add-btn { background: rgba(200,169,126,0.15); border: 1px solid rgba(200,169,126,0.3); color: #c8a97e; border-radius: 8px; font-size: 20px; padding: 0 14px; cursor: pointer; }
    .save-btn { width: 100%; background: #c8a97e; color: #0f0f0f; border: none; border-radius: 10px; font-size: 15px; font-family: Georgia, serif; font-weight: bold; padding: 14px; cursor: pointer; margin-top: 8px; letter-spacing: 0.05em; }
    .reset-btn { width: 100%; background: transparent; color: #7a7570; border: 1px solid rgba(200,169,126,0.2); border-radius: 10px; font-size: 13px; font-family: sans-serif; padding: 10px; cursor: pointer; margin-top: 8px; }
    .day-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .day-tab { background: transparent; border: 1px solid rgba(200,169,126,0.25); border-radius: 20px; color: #7a7570; font-family: sans-serif; font-size: 13px; padding: 6px 20px; cursor: pointer; transition: all 0.2s; }
    .day-tab.active { background: #c8a97e; color: #0f0f0f; border-color: #c8a97e; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container" id="mainView">
    <div class="top-row">
      <div class="subtitle">SOL</div>
      <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </div>
    <h1 id="title">Outfit ☀️</h1>
    <div class="day-tabs"><button class="day-tab active" id="todayTab" onclick="switchDay(0)">Today</button><button class="day-tab" id="tomorrowTab" onclick="switchDay(1)">Tomorrow</button></div>
    <div class="fetch-row">
      <span class="fetch-status" id="fetchStatus">날씨 불러오는 중...</span>
      <button class="refresh-btn" onclick="fetchWeather()">🔄 새로고침</button>
    </div>
    <div class="grid-2">
      <div><div class="field-label">최저 기온 ℃</div><input type="number" id="minTemp" placeholder="예: 7" oninput="updateRange()" /></div>
      <div><div class="field-label">최고 기온 ℃</div><input type="number" id="maxTemp" placeholder="예: 22" oninput="updateRange()" /></div>
    </div>
    <div class="grid-2">
      <div><div class="field-label">바람 (m/s)</div><input type="number" id="wind" placeholder="예: 3" /></div>
      <div><div class="field-label">날씨</div>
        <select id="condition" onchange="updateTitle()">
          <option value="sunny">☀️ 맑음</option>
          <option value="partly">⛅ 구름조금</option>
          <option value="cloudy">☁️ 흐림</option>
          <option value="rain">🌧️ 비</option>
        </select>
      </div>
    </div>
    <div class="range-bar" id="rangeBar" style="display:none"></div>
    <div class="rain-bar" id="rainBar" style="display:none"></div>
    <div id="hourlySection" style="display:none">
      <div class="section-label">시간별 강수확률</div>
      <div class="hourly-grid" id="hourlyGrid"></div>
    </div>
    <div class="error-msg" id="errorMsg" style="display:none"></div>
    <button class="recommend-btn" onclick="recommend()">GET DRESSED →</button>
    <div class="results" id="results" style="display:none"></div>
  </div>

  <div class="settings-wrap" id="settingsView">
    <div class="settings-header">
      <div class="settings-title">My Wardrobe</div>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="section-title">겉옷</div>
    <div class="warmth-hint">따뜻함 1(얇음) ~ 10(두꺼움) · 💧 방수</div>
    <div id="outerList"></div>
    <div class="add-row">
      <input class="add-input" id="newOuterName" placeholder="겉옷 이름" />
      <input class="warmth-input" id="newOuterWarmth" type="number" placeholder="1~10" min="1" max="10" />
      <button class="add-btn" onclick="addOuter()">+</button>
    </div>
    <div class="section-title">하의</div>
    <div class="warmth-hint">따뜻함 1(얇음) ~ 10(두꺼움)</div>
    <div id="bottomList"></div>
    <div class="add-row">
      <input class="add-input" id="newBottomName" placeholder="하의 이름" />
      <input class="warmth-input" id="newBottomWarmth" type="number" placeholder="1~10" min="1" max="10" />
      <button class="add-btn" onclick="addBottom()">+</button>
    </div>
    <button class="save-btn" onclick="saveAndClose()">저장하고 닫기</button>
    <button class="reset-btn" onclick="resetWardrobe()">기본 옷장으로 초기화</button>
  </div>

  <script>
    var DEFAULT_OUTERWEAR = [
      { name: "얇은 패딩", warmth: 9, waterproof: false },
      { name: "두꺼운 울 가디건", warmth: 8, waterproof: false },
      { name: "모직 재킷", warmth: 7, waterproof: false },
      { name: "바람막이", warmth: 6.5, waterproof: true },
      { name: "보통 재킷", warmth: 6, waterproof: false },
      { name: "얇은 정장 재킷", warmth: 5, waterproof: false },
      { name: "얇은 가디건", warmth: 5, waterproof: false },
      { name: "반팔 재킷", warmth: 3, waterproof: false },
      { name: "얇은 반팔 재킷", warmth: 2, waterproof: false }
    ];
    var DEFAULT_BOTTOMS = [
      { name: "기모바지", warmth: 9 },
      { name: "두꺼운 청바지", warmth: 8 },
      { name: "중간두께 롱스커트", warmth: 6.5 },
      { name: "면바지", warmth: 6 },
      { name: "얇은 청바지", warmth: 5.5 },
      { name: "얇은 슬랙스", warmth: 5 },
      { name: "얇은 롱스커트", warmth: 4 },
      { name: "숏스커트", warmth: 2 },
      { name: "반바지", warmth: 1 }
    ];
    var EMOJIS = { sunny: "☀️", partly: "⛅", cloudy: "☁️", rain: "🌧️" };
    var hourlyRainData = [];
    var allDailyData = [];
    var allHourlyData = [];
    var currentDay = 0;
    var maxRainProb = 0;

    function loadWardrobe() {
      try {
        var o = localStorage.getItem("outerwear");
        var b = localStorage.getItem("bottoms");
        var parsedO = o ? JSON.parse(o) : null;
        var parsedB = b ? JSON.parse(b) : null;
        var outerwear = (parsedO && parsedO.length > 0) ? parsedO : DEFAULT_OUTERWEAR;
        var bottoms = (parsedB && parsedB.length > 0) ? parsedB : DEFAULT_BOTTOMS;
        localStorage.setItem("outerwear", JSON.stringify(outerwear));
        localStorage.setItem("bottoms", JSON.stringify(bottoms));
        return { outerwear: outerwear, bottoms: bottoms };
      } catch(e) {
        return { outerwear: DEFAULT_OUTERWEAR, bottoms: DEFAULT_BOTTOMS };
      }
    }

    function saveWardrobe(o, b) {
      localStorage.setItem("outerwear", JSON.stringify(o));
      localStorage.setItem("bottoms", JSON.stringify(b));
    }

    function resetWardrobe() {
      if (confirm("기본 옷장으로 초기화할까요?")) {
        localStorage.setItem("outerwear", JSON.stringify(DEFAULT_OUTERWEAR));
        localStorage.setItem("bottoms", JSON.stringify(DEFAULT_BOTTOMS));
        wardrobe = { outerwear: DEFAULT_OUTERWEAR, bottoms: DEFAULT_BOTTOMS };
        editOuterwear = JSON.parse(JSON.stringify(DEFAULT_OUTERWEAR));
        editBottoms = JSON.parse(JSON.stringify(DEFAULT_BOTTOMS));
        renderList(editOuterwear, "outerList", "deleteOuter");
        renderList(editBottoms, "bottomList", "deleteBottom");
      }
    }

    var wardrobe = loadWardrobe();
    var editOuterwear = [], editBottoms = [];

    function getClosest(items, score, count) {
      return items.slice().sort(function(a, b) { return Math.abs(a.warmth - score) - Math.abs(b.warmth - score); }).slice(0, count);
    }

    function getRecommendations(minTemp, maxTemp, windSpeed, rainProb) {
      var wind = parseFloat(windSpeed) || 0;
      var rain = parseFloat(rainProb) || 0;
      var feelFactor = wind > 4 ? -2 : wind > 2 ? -1 : 0;
      var adjustedMin = minTemp + feelFactor;
      var adjustedMax = maxTemp + feelFactor;
      var avg = (adjustedMin + adjustedMax) / 2;
      var range = maxTemp - minTemp;
      var outerScore, bottomScore;

      if (adjustedMin <= 5) outerScore = 9;
      else if (adjustedMin <= 8) outerScore = 8.5;
      else if (adjustedMin <= 11) outerScore = 7.5;
      else if (adjustedMin <= 14) outerScore = 6.5;
      else if (adjustedMin <= 17) outerScore = 5;
      else if (adjustedMin <= 20) outerScore = 3;
      else outerScore = 2;

      if (avg <= 8) bottomScore = 9;
      else if (avg <= 12) bottomScore = 8;
      else if (avg <= 16) bottomScore = 6.5;
      else if (avg <= 19) bottomScore = 5.5;
      else if (avg <= 22) bottomScore = 4.5;
      else if (avg <= 25) bottomScore = 3;
      else bottomScore = 1.5;

      var outerPool = wardrobe.outerwear.slice();
      if (rain >= 50) {
        var wp = outerPool.filter(function(i) { return i.waterproof; });
        if (wp.length > 0) outerPool = wp.concat(outerPool.filter(function(i) { return !i.waterproof; }));
      }

      var outers = getClosest(outerPool, outerScore, 3);
      var bottoms = getClosest(wardrobe.bottoms, bottomScore, 3);
      var rainNote = rain >= 50 ? "우산 필수 ☂️" : rain >= 30 ? "우산 챙기세요" : null;
      var windNote = wind > 3 ? "바람 있어요 🌬️" : null;
      var rangeNote = range >= 13 ? "일교차 주의!" : null;
      var mainNote = rainNote || windNote || rangeNote;
      var combos = [];

      combos.push({ label: range >= 13 ? "아침 외출 추천" : "기본 추천", outer: outers[0], bottom: bottoms[0], note: mainNote });
      if (outers[1] && range >= 10) combos.push({ label: "낮 기온 고려", outer: outers[1], bottom: bottoms[0], note: "낮엔 벗어도 OK" });
      if (bottoms[1]) combos.push({ label: "활동적인 날", outer: outers[0], bottom: bottoms[1], note: null });
      return combos;
    }

    function updateTitle() {
      document.getElementById("title").textContent = "Outfit " + EMOJIS[document.getElementById("condition").value];
    }

    function updateRange() {
      var min = parseFloat(document.getElementById("minTemp").value);
      var max = parseFloat(document.getElementById("maxTemp").value);
      var bar = document.getElementById("rangeBar");
      if (!isNaN(min) && !isNaN(max) && max > min) {
        var range = Math.round(max - min);
        bar.style.display = "block";
        bar.style.color = range >= 13 ? "#e07b54" : "#c8a97e";
        bar.textContent = "일교차 " + range + "도" + (range >= 13 ? " ⚠️ 많이 벌어졌어요" : "");
      } else { bar.style.display = "none"; }
    }

    function showHourlyRain(hourlyData) {
      if (!hourlyData || hourlyData.length === 0) return;
      var now = new Date().getHours();
      var slots = [];
      for (var i = 0; i < 16; i += 2) {
        slots.push({ hour: (now + i) % 24, prob: hourlyData[now + i] || 0 });
      }
      var gridHtml = "";
      slots.forEach(function(s) {
        gridHtml += '<div class="hour-cell"><div class="hour-time">' + s.hour + '시</div><div class="hour-prob ' + (s.prob >= 30 ? 'wet' : 'dry') + '">' + s.prob + '%</div></div>';
      });
      document.getElementById("hourlyGrid").innerHTML = gridHtml;
      document.getElementById("hourlySection").style.display = "block";

      var rainBar = document.getElementById("rainBar");
      var highSlots = slots.filter(function(s) { return s.prob >= 50; });
      maxRainProb = Math.max.apply(null, slots.map(function(s) { return s.prob; }));

      if (highSlots.length > 0) {
        rainBar.className = "rain-bar high";
        rainBar.style.display = "block";
        rainBar.textContent = "🌧️ " + highSlots[0].hour + "시~" + highSlots[highSlots.length-1].hour + "시 강수확률 높아요 — 우산 챙기세요";
      } else if (maxRainProb >= 30) {
        rainBar.className = "rain-bar mid";
        rainBar.style.display = "block";
        rainBar.textContent = "🌂 오늘 강수확률 최대 " + maxRainProb + "% — 우산 가져가면 안심";
      } else {
        rainBar.style.display = "none";
      }
    }

    function recommend() {
      var min = parseFloat(document.getElementById("minTemp").value);
      var max = parseFloat(document.getElementById("maxTemp").value);
      var wind = document.getElementById("wind").value;
      var errorEl = document.getElementById("errorMsg");
      var resultsEl = document.getElementById("results");

      if (isNaN(min) || isNaN(max)) { errorEl.textContent = "⚠️ 최저/최고 기온을 입력해주세요!"; errorEl.style.display = "block"; resultsEl.style.display = "none"; return; }
      if (min >= max) { errorEl.textContent = "⚠️ 최고기온이 최저기온보다 높아야 해요!"; errorEl.style.display = "block"; resultsEl.style.display = "none"; return; }
      errorEl.style.display = "none";

      var combos = getRecommendations(min, max, wind, maxRainProb);
      var html = '<div class="results-title">추천 코디 ' + combos.length + '가지</div>';

      if (maxRainProb >= 30) {
        var now = new Date().getHours();
        var highSlots = hourlyRainData.slice(now, now + 8).map(function(p, i) { return { hour: (now + i) % 24, prob: p }; }).filter(function(s) { return s.prob >= 50; });
        html += '<div class="umbrella-card"><div class="umbrella-title">☂️ 우산 챙기세요</div><div class="rain-hours">';
        html += highSlots.length > 0 ? highSlots[0].hour + "시~" + highSlots[highSlots.length-1].hour + "시 강수확률 높음" : "오늘 강수확률 최대 " + maxRainProb + "%";
        if (maxRainProb >= 50 && wardrobe.outerwear.some(function(i) { return i.waterproof; })) html += "<br>방수 겉옷 우선 추천했어요";
        html += '</div></div>';
      }

      combos.forEach(function(combo) {
        html += '<div class="card"><div class="card-header"><span class="chip">' + combo.label + '</span>';
        if (combo.note) html += '<span class="card-note">' + combo.note + '</span>';
        html += '</div><div class="items-row"><div class="item-box"><div class="item-label">겉옷</div><div class="item-name">' + combo.outer.name + '</div></div>';
        html += '<div class="item-box"><div class="item-label">하의</div><div class="item-name">' + combo.bottom.name + '</div></div></div></div>';
      });
      html += '<div class="tip">💡 일교차가 클 땐 겉옷을 쉽게 벗을 수 있는 조합이 좋아요</div>';
      resultsEl.innerHTML = html;
      resultsEl.style.display = "block";
    }

    async function fetchWeatherByCoords(lat, lon) {
      var statusEl = document.getElementById("fetchStatus");
      try {
        var res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&daily=temperature_2m_max,temperature_2m_min,windspeed_10m_max,weathercode&hourly=precipitation_probability&timezone=Asia%2FSeoul&forecast_days=2");
        if (!res.ok) throw new Error();
        var data = await res.json();
        allHourlyData = data.hourly.precipitation_probability.slice(0, 48);
        allDailyData = [0, 1].map(function(d) {
          var code = data.daily.weathercode[d];
          return {
            max: Math.round(data.daily.temperature_2m_max[d]),
            min: Math.round(data.daily.temperature_2m_min[d]),
            wind: Math.round(data.daily.windspeed_10m_max[d] / 3.6),
            cond: code >= 61 ? "rain" : code >= 45 ? "cloudy" : code >= 2 ? "partly" : "sunny"
          };
        });
        currentDay = 0;
        switchDay(0);
        statusEl.className = "fetch-status success";
        statusEl.textContent = "✓ 현재 위치 날씨 불러왔어요";
      } catch(e) {
        statusEl.className = "fetch-status error";
        statusEl.textContent = "날씨 불러오기 실패 — 직접 입력해주세요";
      }
    }

    function fetchWeather() {
      var statusEl = document.getElementById("fetchStatus");
      statusEl.className = "fetch-status";
      statusEl.textContent = "위치 확인 중...";
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(pos) { fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude); },
          function() { fetchWeatherByCoords(37.5172, 126.8665); }
        );
      } else { fetchWeatherByCoords(37.5172, 126.8665); }
    }

    function renderList(items, containerId, deleteFn) {
      var html = "";
      items.forEach(function(item, i) {
        html += '<div class="item-row"><span>' + item.name + (item.waterproof ? ' 💧' : '') + '</span>';
        html += '<div style="display:flex;align-items:center;"><span class="item-row-warmth">따뜻함 ' + item.warmth + '</span>';
        html += '<button class="delete-btn" onclick="' + deleteFn + '(' + i + ')">✕</button></div></div>';
      });
      document.getElementById(containerId).innerHTML = html;
    }

    function openSettings() {
      editOuterwear = JSON.parse(JSON.stringify(wardrobe.outerwear));
      editBottoms = JSON.parse(JSON.stringify(wardrobe.bottoms));
      renderList(editOuterwear, "outerList", "deleteOuter");
      renderList(editBottoms, "bottomList", "deleteBottom");
      document.getElementById("mainView").style.display = "none";
      document.getElementById("settingsView").style.display = "block";
      window.scrollTo(0, 0);
    }

    function closeSettings() {
      document.getElementById("settingsView").style.display = "none";
      document.getElementById("mainView").style.display = "block";
      window.scrollTo(0, 0);
    }

    function deleteOuter(i) { editOuterwear.splice(i, 1); renderList(editOuterwear, "outerList", "deleteOuter"); }
    function deleteBottom(i) { editBottoms.splice(i, 1); renderList(editBottoms, "bottomList", "deleteBottom"); }

    function addOuter() {
      var name = document.getElementById("newOuterName").value.trim();
      var warmth = parseFloat(document.getElementById("newOuterWarmth").value);
      if (!name || isNaN(warmth)) return;
      editOuterwear.push({ name: name, warmth: warmth, waterproof: false });
      editOuterwear.sort(function(a, b) { return b.warmth - a.warmth; });
      document.getElementById("newOuterName").value = "";
      document.getElementById("newOuterWarmth").value = "";
      renderList(editOuterwear, "outerList", "deleteOuter");
    }

    function addBottom() {
      var name = document.getElementById("newBottomName").value.trim();
      var warmth = parseFloat(document.getElementById("newBottomWarmth").value);
      if (!name || isNaN(warmth)) return;
      editBottoms.push({ name: name, warmth: warmth });
      editBottoms.sort(function(a, b) { return b.warmth - a.warmth; });
      document.getElementById("newBottomName").value = "";
      document.getElementById("newBottomWarmth").value = "";
      renderList(editBottoms, "bottomList", "deleteBottom");
    }

    function saveAndClose() {
      wardrobe.outerwear = editOuterwear;
      wardrobe.bottoms = editBottoms;
      saveWardrobe(wardrobe.outerwear, wardrobe.bottoms);
      closeSettings();
    }

    fetchWeather();

    function switchDay(day) {
      currentDay = day;
      document.getElementById("todayTab").className = "day-tab" + (day === 0 ? " active" : "");
      document.getElementById("tomorrowTab").className = "day-tab" + (day === 1 ? " active" : "");
      if (allDailyData.length === 0) return;
      var d = allDailyData[day];
      var hourly = allHourlyData.slice(day * 24, day * 24 + 24);
      document.getElementById("minTemp").value = d.min;
      document.getElementById("maxTemp").value = d.max;
      document.getElementById("wind").value = d.wind;
      document.getElementById("condition").value = d.cond;
      hourlyRainData = hourly;
      var now = day === 0 ? new Date().getHours() : 0;
      showHourlyRainFrom(hourly, now);
      updateRange();
      updateTitle();
      document.getElementById("results").style.display = "none";
    }

    function showHourlyRainFrom(hourlyData, startHour) {
      if (!hourlyData || hourlyData.length === 0) return;
      var slots = [];
      for (var i = 0; i < 16; i += 2) {
        var idx = startHour + i;
        if (idx >= 24) break;
        slots.push({ hour: (startHour + i) % 24, prob: hourlyData[idx] || 0 });
      }
      var gridHtml = "";
      slots.forEach(function(s) {
        gridHtml += '<div class="hour-cell"><div class="hour-time">' + s.hour + '시</div><div class="hour-prob ' + (s.prob >= 30 ? 'wet' : 'dry') + '">' + s.prob + '%</div></div>';
      });
      document.getElementById("hourlyGrid").innerHTML = gridHtml;
      document.getElementById("hourlySection").style.display = "block";
      var rainBar = document.getElementById("rainBar");
      var highSlots = slots.filter(function(s) { return s.prob >= 50; });
      maxRainProb = slots.length > 0 ? Math.max.apply(null, slots.map(function(s) { return s.prob; })) : 0;
      if (highSlots.length > 0) {
        rainBar.className = "rain-bar high";
        rainBar.style.display = "block";
        rainBar.textContent = "🌧️ " + highSlots[0].hour + "시~" + highSlots[highSlots.length-1].hour + "시 강수확률 높아요 — 우산 챙기세요";
      } else if (maxRainProb >= 30) {
        rainBar.className = "rain-bar mid";
        rainBar.style.display = "block";
        rainBar.textContent = "🌂 강수확률 최대 " + maxRainProb + "% — 우산 가져가면 안심";
      } else {
        rainBar.style.display = "none";
      }
    }
  </script>

</body>
</html>
