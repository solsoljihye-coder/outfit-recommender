<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>Outfit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f0f0f;
      color: #f0ece4;
      font-family: Georgia, serif;
      display: flex;
      justify-content: center;
      padding: 44px 16px 60px;
    }
    .container { width: 100%; max-width: 420px; }
    .subtitle {
      font-size: 11px;
      color: #7a7570;
      font-family: sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .desc {
      font-size: 13px;
      color: #7a7570;
      font-family: sans-serif;
      text-align: center;
      margin-bottom: 24px;
    }
    .fetch-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .fetch-status {
      font-size: 12px;
      font-family: sans-serif;
      color: #7a7570;
    }
    .fetch-status.success { color: #c8a97e; }
    .fetch-status.error { color: #e07b54; }
    .refresh-btn {
      background: transparent;
      color: #c8a97e;
      border: 1px solid rgba(200,169,126,0.3);
      border-radius: 6px;
      font-size: 12px;
      font-family: sans-serif;
      padding: 5px 12px;
      cursor: pointer;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .field-label {
      font-size: 11px;
      color: #7a7570;
      font-family: sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input, select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(200,169,126,0.25);
      border-radius: 8px;
      color: #f0ece4;
      font-size: 16px;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      font-family: Georgia, serif;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: #c8a97e; }
    select option { background: #1a1a1a; color: #f0ece4; }
    .range-bar {
      font-size: 12px;
      font-family: sans-serif;
      padding: 7px 12px;
      background: rgba(200,169,126,0.05);
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .recommend-btn {
      width: 100%;
      background: #c8a97e;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-family: Georgia, serif;
      font-weight: bold;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }
    .recommend-btn:active { background: #b8996e; }
    .error-msg {
      color: #e07b54;
      font-size: 13px;
      font-family: sans-serif;
      margin-bottom: 8px;
    }
    .results { margin-top: 28px; }
    .results-title {
      font-size: 11px;
      color: #7a7570;
      font-family: sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,169,126,0.18);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .chip {
      display: inline-block;
      background: rgba(200,169,126,0.12);
      border: 1px solid rgba(200,169,126,0.3);
      color: #c8a97e;
      font-size: 11px;
      font-family: sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .card-note {
      font-size: 11px;
      color: #7a7570;
      font-family: sans-serif;
    }
    .items-row { display: flex; gap: 10px; }
    .item-box {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 12px;
    }
    .item-label {
      font-size: 10px;
      color: #7a7570;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: sans-serif;
      margin-bottom: 5px;
    }
    .item-name { font-size: 16px; }
    .tip {
      padding: 12px 14px;
      background: rgba(200,169,126,0.05);
      border-radius: 8px;
      font-size: 12px;
      color: #7a7570;
      font-family: sans-serif;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="subtitle">SOL</div>
    <h1 id="title">Outfit ☀️</h1>
    <p class="desc">based on today's weather</p>

```
<div class="fetch-row">
  <span class="fetch-status" id="fetchStatus">날씨 불러오는 중...</span>
  <button class="refresh-btn" onclick="fetchWeather()">🔄 새로고침</button>
</div>

<div class="grid-2">
  <div>

  </div>

  <script>
    const OUTERWEAR = [
      { name: "얇은 패딩", warmth: 9 },
      { name: "두꺼운 울 가디건", warmth: 8 },
      { name: "모직 재킷", warmth: 7 },
      { name: "바람막이", warmth: 6.5 },
      { name: "보통 재킷", warmth: 6 },
      { name: "얇은 정장 재킷", warmth: 5 },
      { name: "얇은 가디건", warmth: 5 },
      { name: "반팔 재킷", warmth: 3 },
      { name: "얇은 반팔 재킷", warmth: 2 },
    ];

    const BOTTOMS = [
      { name: "기모바지", warmth: 9 },
      { name: "두꺼운 청바지", warmth: 8 },
      { name: "중간두께 롱스커트", warmth: 6.5 },
      { name: "면바지", warmth: 6 },
      { name: "얇은 청바지", warmth: 5.5 },
      { name: "얇은 슬랙스", warmth: 5 },
      { name: "얇은 롱스커트", warmth: 4 },
      { name: "숏스커트", warmth: 2 },
      { name: "반바지", warmth: 1 },
    ];

    const EMOJIS = { sunny: "☀️", partly: "⛅", cloudy: "☁️", rain: "🌧️" };

    function getClosest(items, score, count) {
      return [...items]
        .sort((a, b) => Math.abs(a.warmth - score) - Math.abs(b.warmth - score))
        .slice(0, count);
    }

    function getRecommendations(minTemp, maxTemp, windSpeed) {
      const wind = parseFloat(windSpeed) || 0;
      const feelFactor = wind > 4 ? -2 : wind > 2 ? -1 : 0;
      const adjustedMin = minTemp + feelFactor;
      const adjustedMax = maxTemp + feelFactor;
      const avg = (adjustedMin + adjustedMax) / 2;
      const range = maxTemp - minTemp;

      let outerScore;
      if (adjustedMin <= 5) outerScore = 9;
      else if (adjustedMin <= 8) outerScore = 8.5;
      else if (adjustedMin <= 11) outerScore = 7.5;
      else if (adjustedMin <= 14) outerScore = 6.5;
      else if (adjustedMin <= 17) outerScore = 5;
      else if (adjustedMin <= 20) outerScore = 3;
      else outerScore = 2;

      let bottomScore;
      if (avg <= 8) bottomScore = 9;
      else if (avg <= 12) bottomScore = 8;
      else if (avg <= 16) bottomScore = 6.5;
      else if (avg <= 19) bottomScore = 5.5;
      else if (avg <= 22) bottomScore = 4.5;
      else if (avg <= 25) bottomScore = 3;
      else bottomScore = 1.5;

      const outers = getClosest(OUTERWEAR, outerScore, 3);
      const bottoms = getClosest(BOTTOMS, bottomScore, 3);
      const combos = [];

      combos.push({
        label: range >= 13 ? "아침 외출 추천" : "기본 추천",
        outer: outers[0], bottom: bottoms[0],
        note: wind > 3 ? "바람 있어요 🌬️" : range >= 13 ? "일교차 주의!" : null,
      });

      if (outers[1] && range >= 10) {
        combos.push({
          label: "낮 기온 고려",
          outer: outers[1], bottom: bottoms[0],
          note: "낮엔 벗어도 OK",
        });
      }

      if (bottoms[1]) {
        combos.push({
          label: "활동적인 날",
          outer: outers[0], bottom: bottoms[1],
          note: null,
        });
      }

      return combos;
    }

    function updateTitle() {
      const cond = document.getElementById("condition").value;
      document.getElementById("title").textContent = "Outfit " + EMOJIS[cond];
    }

    function updateRange() {
      const min = parseFloat(document.getElementById("minTemp").value);
      const max = parseFloat(document.getElementById("maxTemp").value);
      const bar = document.getElementById("rangeBar");
      if (!isNaN(min) && !isNaN(max) && max > min) {
        const range = Math.round(max - min);
        bar.style.display = "block";
        bar.style.color = range >= 13 ? "#e07b54" : "#c8a97e";
        bar.textContent = "일교차 " + range + "도" + (range >= 13 ? " ⚠️ 많이 벌어졌어요" : "");
      } else {
        bar.style.display = "none";
      }
    }

    function recommend() {
      const min = parseFloat(document.getElementById("minTemp").value);
      const max = parseFloat(document.getElementById("maxTemp").value);
      const wind = document.getElementById("wind").value;
      const errorEl = document.getElementById("errorMsg");
      const resultsEl = document.getElementById("results");

      if (isNaN(min) || isNaN(max)) {
        errorEl.textContent = "⚠️ 최저/최고 기온을 입력해주세요!";
        errorEl.style.display = "block";
        resultsEl.style.display = "none";
        return;
      }
      if (min >= max) {
        errorEl.textContent = "⚠️ 최고기온이 최저기온보다 높아야 해요!";
        errorEl.style.display = "block";
        resultsEl.style.display = "none";
        return;
      }

      errorEl.style.display = "none";
      const combos = getRecommendations(min, max, wind);

      let html = `<div class="results-title">추천 코디 ${combos.length}가지</div>`;
      combos.forEach(combo => {
        html += `
          <div class="card">
            <div class="card-header">
              <span class="chip">${combo.label}</span>
              ${combo.note ? `<span class="card-note">${combo.note}</span>` : ""}
            </div>
            <div class="items-row">
              <div class="item-box">
                <div class="item-label">겉옷</div>
                <div class="item-name">${combo.outer.name}</div>
              </div>
              <div class="item-box">
                <div class="item-label">하의</div>
                <div class="item-name">${combo.bottom.name}</div>
              </div>
            </div>
          </div>`;
      });
      html += `<div class="tip">💡 일교차가 클 땐 겉옷을 쉽게 벗을 수 있는 조합이 좋아요</div>`;

      resultsEl.innerHTML = html;
      resultsEl.style.display = "block";
    }

    async function fetchWeatherByCoords(lat, lon) {
      const statusEl = document.getElementById("fetchStatus");
      try {
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,windspeed_10m_max,weathercode&timezone=Asia%2FSeoul&forecast_days=1`
        );
        if (!res.ok) throw new Error();
        const data = await res.json();
        const max = Math.round(data.daily.temperature_2m_max[0]);
        const min = Math.round(data.daily.temperature_2m_min[0]);
        const windMs = Math.round(data.daily.windspeed_10m_max[0] / 3.6);
        const code = data.daily.weathercode[0];

        let cond = "sunny";
        if (code >= 61) cond = "rain";
        else if (code >= 45) cond = "cloudy";
        else if (code >= 2) cond = "partly";

        document.getElementById("minTemp").value = min;
        document.getElementById("maxTemp").value = max;
        document.getElementById("wind").value = windMs;
        document.getElementById("condition").value = cond;
        updateRange();
        updateTitle();

        statusEl.className = "fetch-status success";
        statusEl.textContent = "✓ 현재 위치 날씨 불러왔어요";
      } catch (e) {
        statusEl.className = "fetch-status error";
        statusEl.textContent = "날씨 불러오기 실패 — 직접 입력해주세요";
      }
    }

    function fetchWeather() {
      const statusEl = document.getElementById("fetchStatus");
      statusEl.className = "fetch-status";
      statusEl.textContent = "위치 확인 중...";

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude);
          },
          () => {
            // 위치 거부시 서울 양천구 기본값
            fetchWeatherByCoords(37.5172, 126.8665);
          }
        );
      } else {
        fetchWeatherByCoords(37.5172, 126.8665);
      }
    }

    fetchWeather();
  </script>

</body>
